<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sản phẩm</title>
    <style>
        .create-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: #fff;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border: none;
        }
        
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .alert {
            border: none;
            border-left: 4px solid #e74c3c;
            border-radius: 5px;
            padding: 12px 15px;
            margin-top: 8px;
            background: rgba(231, 76, 60, 0.1);
            color: #c0392b;
            font-size: 0.9rem;
        }
        
        .file-input-wrapper {
            position: relative;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .file-input-label:hover {
            border-color: #764ba2;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .file-input-wrapper input[type="file"] {
            display: none;
        }
        
        .file-icon {
            font-size: 2rem;
            color: #667eea;
            margin-right: 10px;
        }
        
        .current-image {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }
        
        .current-image img {
            max-width: 200px;
            height: auto;
            border-radius: 8px;
        }
        
        .current-image label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn-submit {
            flex: 1;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-back {
            flex: 1;
            background: #e0e0e0;
            color: #2c3e50;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-back:hover {
            background: #d0d0d0;
            color: #2c3e50;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container create-container body-content">
    <div class="card">
        <div class="card-header">
            <h3>
                <i class="fas fa-edit"></i>
                Chỉnh sửa sản phẩm
            </h3>
        </div>
        <div class="card-body">
            <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group">
                    <label for="name" class="form-label">Tên sản phẩm <span style="color: #e74c3c;">*</span></label>
                    <input type="text" th:field="*{name}" id="name" placeholder="Nhập tên sản phẩm..." class="form-control"/>
                    <div class="alert" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                
                <div class="form-group">
                    <label for="price" class="form-label">Giá sản phẩm <span style="color: #e74c3c;">*</span></label>
                    <input type="number" step="0.01" th:field="*{price}" id="price" placeholder="Nhập giá..." class="form-control"/>
                    <div class="alert" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>
                
                <div class="form-group">
                    <label for="imageProduct" class="form-label">Hình ảnh sản phẩm</label>
                    <div class="file-input-wrapper">
                        <label for="imageProduct" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt file-icon"></i>
                            <div>
                                <div style="font-weight: 600;">Chọn hình ảnh mới</div>
                                <div style="font-size: 0.85rem; color: #666;">PNG, JPG (tối đa 5MB)</div>
                            </div>
                        </label>
                        <input type="file" id="imageProduct" name="imageProduct" accept="image/png, image/jpeg" class="form-control"/>
                    </div>
                    <div th:if="${product.image}" class="current-image">
                        <label>Hình ảnh hiện tại:</label>
                        <img th:src="@{/images/} + ${product.image}" th:alt="${product.name}">
                    </div>
                    <div class="alert" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                </div>
                
                <div class="form-group">
                    <label for="category" class="form-label">Danh mục <span style="color: #e74c3c;">*</span></label>
                    <select th:field="*{category.id}" id="category" class="form-select">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                    </select>
                    <div class="alert" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>
                
                <div class="btn-container">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Cập nhật sản phẩm
                    </button>
                    <a th:href="@{/products}" class="btn-back">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
